version: 2

project_name: ding

before:
  hooks:
    - go mod tidy

builds:
  - id: ding
    main: ./cmd/ding/
    binary: ding
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ding
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - ding.yaml.example
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

dockers:
  - image_templates:
      - "ghcr.io/zuchka/ding:{{ .Tag }}-amd64"
    use: buildx
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/zuchka/ding:{{ .Tag }}-arm64"
    use: buildx
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/zuchka/ding:{{ .Tag }}"
    image_templates:
      - "ghcr.io/zuchka/ding:{{ .Tag }}-amd64"
      - "ghcr.io/zuchka/ding:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/zuchka/ding:latest"
    image_templates:
      - "ghcr.io/zuchka/ding:{{ .Tag }}-amd64"
      - "ghcr.io/zuchka/ding:{{ .Tag }}-arm64"

brews:
  - repository:
      owner: zuchka
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://ding.ing
    description: Stream-based alerting daemon — single binary, zero infrastructure
    license: MIT
    install: |
      bin.install "ding"
    test: |
      system "#{bin}/ding", "--version"
